exclude = [
    "core-spec-supplemental-release_dec2025/**",
    "target/**",
]

[formatting]
align_comments = false
array_auto_expand = false
array_auto_collapse = false
reorder_keys = false
indent_string = "    "
column_width = 140

[[rule]]
include = ["**/Cargo.toml"]
keys = ["dependencies", "dev-dependencies", "workspace.dependencies", "workspace.lints"]

[rule.formatting]
reorder_arrays = true
reorder_keys = true
reorder_inline_tables = true

[[rule]]
include = ["**/Cargo.toml"]
keys = ["workspace"] # actually targeted at workspace.members

[rule.formatting]
reorder_arrays = true

[[rule]]
include = ["deps.toml"]

[rule.formatting]
reorder_arrays = true
reorder_keys = true
reorder_inline_tables = true
